<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNC | Réseau Équipe</title>
    <style>
        :root {
            --primary-blue: #005bb5;
            --success-green: #2ecc71;
            --pure-white: #ffffff;
            --soft-gray: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--soft-gray);
            color: var(--text-dark);
            padding-bottom: 80px;
        }

        /* En-tête stylisé */
        .header-gradient {
            background: linear-gradient(135deg, var(--primary-blue), #003d7a);
            color: white;
            padding: 40px 20px 60px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        /* Carte d'invitation flottante */
        .card-invite {
            background: var(--pure-white);
            margin: -40px 20px 20px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .share-label {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 12px;
            display: block;
        }

        .copy-wrapper {
            display: flex;
            background: #eef2f3;
            padding: 6px;
            border-radius: 12px;
            border: 2px solid var(--primary-blue);
        }

        #invite-link {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px;
            font-size: 12px;
            outline: none;
            color: #555;
        }

        .btn-action {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Grille de stats façon "Tableau de bord" */
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: var(--pure-white);
            padding: 15px 5px;
            border-radius: 15px;
            text-align: center;
            border-bottom: 4px solid var(--success-green);
        }

        .val-num { font-size: 20px; font-weight: 800; color: var(--primary-blue); }
        .val-label { font-size: 10px; color: #7f8c8d; text-transform: uppercase; margin-top: 4px; font-weight: bold; }

        /* Liste des membres sans vide inutile */
        .list-section {
            padding: 0 20px;
        }

        .member-item {
            background: var(--pure-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 5px solid var(--success-green);
        }

        .member-details b { font-size: 14px; color: var(--text-dark); }
        .member-details span { font-size: 11px; color: #95a5a6; display: block; margin-top: 2px; }

        .tag-lvl {
            font-size: 10px;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: bold;
            color: white;
        }
        .bg-l1 { background-color: var(--success-green); }
        .bg-l2 { background-color: #f1c40f; }
        .bg-l3 { background-color: #e67e22; }

        /* Navigation */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 15px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        .nav-btn { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; font-weight: bold; }
        .nav-btn.active { color: var(--primary-blue); }
    </style>
</head>
<body>

    <div class="header-gradient">
        <h2 style="margin:0">Mon Réseau</h2>
        <p style="margin:8px 0 0; font-size:13px; opacity:0.9">Commissions : 25% (L1) • 3% (L2) • 1% (L3)</p>
    </div>

    <div class="card-invite">
        <span class="share-label">📲 Partagez votre lien</span>
        <div class="copy-wrapper">
            <input type="text" id="invite-link" readonly value="Chargement du lien...">
            <button class="btn-action" onclick="copierLien()">COPIER</button>
        </div>
    </div>

    <div class="grid-stats">
        <div class="stat-box">
            <div class="val-num" id="n1">0</div>
            <div class="val-label">Niveau 1</div>
        </div>
        <div class="stat-box">
            <div class="val-num" id="n2">0</div>
            <div class="val-label">Niveau 2</div>
        </div>
        <div class="stat-box">
            <div class="val-num" id="n3">0</div>
            <div class="val-label">Niveau 3</div>
        </div>
    </div>

    <div class="list-section" id="list-members">
        </div>

    <nav class="nav-bottom">
        <a href="accueil.html" class="nav-btn">🏠<br>ACCUEIL</a>
        <a href="produit.html" class="nav-btn">🛍️<br>PRODUIT</a>
        <a href="equipe.html" class="nav-btn active">👥<br>ÉQUIPE</a>
        <a href="profile.html" class="nav-btn">👤<br>PROFIL</a>
    </nav>

    <script>
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('dnc_user')) || { phone: "000" };
            
            // 1. Lien de parrainage
            const link = window.location.origin + "/inscription.html?ref=" + user.phone;
            document.getElementById('invite-link').value = link;

            // 2. Calcul du réseau
            const all = JSON.parse(localStorage.getItem('dnc_all_users')) || [];
            
            const l1 = all.filter(u => u.referredBy === user.phone);
            const l2 = all.filter(u => l1.some(p => p.phone === u.referredBy));
            const l3 = all.filter(u => l2.some(p => p.phone === u.referredBy));

            document.getElementById('n1').innerText = l1.length;
            document.getElementById('n2').innerText = l2.length;
            document.getElementById('n3').innerText = l3.length;

            const box = document.getElementById('list-members');
            box.innerHTML = ""; 

            const add = (arr, level, css) => {
                arr.forEach(m => {
                    box.innerHTML += `
                        <div class="member-item">
                            <div class="member-details">
                                <b>+${m.phone}</b>
                                <span>Inscrit le ${m.date || '---'}</span>
                            </div>
                            <span class="tag-lvl ${css}">Lvl ${level}</span>
                        </div>
                    `;
                });
            };

            if ((l1.length + l2.length + l3.length) === 0) {
                box.innerHTML = '<p style="text-align:center; color:#bdc3c7; margin-top:30px;">Aucun membre dans votre équipe pour le moment.</p>';
            } else {
                add(l1, 1, 'bg-l1');
                add(l2, 2, 'bg-l2');
                add(l3, 3, 'bg-l3');
            }
        };

        function copierLien() {
            const input = document.getElementById("invite-link");
            input.select();
            document.execCommand("copy");
            alert("Lien de parrainage copié !");
        }
    </script>
</body>
</html>
