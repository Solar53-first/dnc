<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNC - Connexion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 85%;
            max-width: 400px;
            margin-top: 80px;
        }

        .logo-title {
            text-align: center;
            font-size: 60px;
            font-weight: bold;
            color: #005bb5;
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #888888;
            font-size: 15px;
            margin-top: 10px;
            margin-bottom: 40px;
            display: none; /* Masqué pour coller à ton deuxième exemple */
        }

        .input-group {
            margin-bottom: 18px;
            display: flex;
            border: 2px solid #005bb5;
            border-radius: 10px;
            overflow: hidden;
            align-items: center;
        }

        .icon-box {
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #eee;
            min-width: 50px;
        }

        .prefix-text {
            color: #005bb5;
            font-weight: bold;
            font-size: 16px;
        }

        input {
            flex-grow: 1;
            border: none;
            padding: 16px;
            font-size: 16px;
            outline: none;
            color: #333;
        }

        input::placeholder {
            color: #b0b0b0;
        }

        .btn-connect {
            width: 100%;
            background-color: #005bb5;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 35px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 91, 181, 0.2);
        }

        .btn-connect:active {
            background-color: #004488;
            transform: scale(0.98);
        }

        .footer-link {
            text-align: center;
            margin-top: 30px;
            font-size: 15px;
            color: #888888;
        }

        .footer-link a {
            color: #005bb5;
            font-weight: bold;
            text-decoration: none;
        }

        /* Icônes simplifiées en emoji pour correspondre au visuel sans images externes */
        .icon-phone::before { content: "📞"; }
        .icon-lock::before { content: "🔒"; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo-title">DNC</h1>

        <div class="input-group">
            <div class="icon-box">
                <span class="icon-phone"></span>
                <span class="prefix-text" style="margin-left: 5px;">+243</span>
            </div>
            <input type="tel" id="login-phone" placeholder="Numéro de téléphone" maxlength="9">
        </div>

        <div class="input-group">
            <div class="icon-box">
                <span class="icon-lock"></span>
            </div>
            <input type="password" id="login-pin" placeholder="Mot de passe" inputmode="numeric" maxlength="6">
        </div>

        <button class="btn-connect" onclick="loginUser()">Se Connecter</button>

        <div class="footer-link">
            Nouveau ici ? <a href="inscription.html">Créer un compte ></a>
        </div>
    </div>

    <script>
        function loginUser() {
            const phoneSuffix = document.getElementById('login-phone').value;
            const pin = document.getElementById('login-pin').value;
            const fullPhone = "+243" + phoneSuffix;

            // Récupération des données dans le stockage local
            const storedUser = JSON.parse(localStorage.getItem('dnc_user'));

            if (!storedUser) {
                alert("Aucun compte trouvé. Veuillez d'abord vous inscrire.");
                window.location.href = 'inscription.html';
                return;
            }

            // Vérification stricte des identifiants
            if (storedUser.phone === fullPhone && storedUser.pin === pin) {
                // Succès : Redirection vers l'accueil
                window.location.href = 'accueil.html';
            } else {
                alert("Numéro ou mot de passe incorrect.");
            }
        }
    </script>

</body>
</html>
