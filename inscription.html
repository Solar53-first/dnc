<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNC - Inscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 85%;
            max-width: 400px;
            margin-top: 60px;
        }

        .logo-title {
            text-align: center;
            font-size: 55px;
            font-weight: bold;
            color: #000000;
            margin: 0;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #888888;
            font-size: 15px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .standard-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #008000;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            box-sizing: border-box;
            outline: none;
        }

        .phone-group {
            display: flex;
            border: 2px solid #008000;
            border-radius: 8px;
            overflow: hidden;
        }

        .phone-prefix {
            background-color: #f4f4f4;
            padding: 15px;
            font-weight: bold;
            color: #333;
            border-right: 1px solid #008000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .phone-input {
            flex-grow: 1;
            border: none;
            padding: 15px;
            font-size: 15px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            background-color: #008000;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #888888;
        }

        .footer a {
            color: #008000;
            font-weight: bold;
            text-decoration: none;
        }

        /* Style pour le label du parrain */
        .ref-label {
            font-size: 11px;
            color: #000000;
            margin-bottom: 5px;
            display: block;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo-title">DNC</h1>
        <p class="subtitle">Créez votre compte</p>

        <div class="input-group">
            <input type="text" id="username" class="standard-input" placeholder="Nom d'utilisateur">
        </div>

        <div class="input-group phone-group">
            <div class="phone-prefix">+243</div>
            <input type="tel" id="phone" class="phone-input" placeholder="Numéro (9 chiffres)" maxlength="9">
        </div>

        <div class="input-group">
            <input type="password" id="pin" class="standard-input" placeholder="Mot de passe (6 chiffres)" inputmode="numeric" maxlength="6">
        </div>

        <div class="input-group">
            <input type="password" id="pin_confirm" class="standard-input" placeholder="Confirmer le mot de passe" inputmode="numeric" maxlength="6">
        </div>

        <div class="input-group">
            <label class="ref-label">ID Parrain :</label>
            <input type="text" id="referral_code" class="standard-input" value="Direct" readonly style="background: #f9f9f9;">
        </div>

        <button class="btn-submit" onclick="registerUser()">S'inscrire</button>

        <div class="footer">
            Déjà un compte ? <a href="index.html">Se connecter</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Configuration de ta console Firebase
        const firebaseConfig = {
            apiKey: "TA_CLE_API_ICI",
            authDomain: "dnc-network-7225b.firebaseapp.com",
            databaseURL: "https://dnc-network-7225b-default-rtdb.firebaseio.com/",
            projectId: "dnc-network-7225b",
            storageBucket: "dnc-network-7225b.appspot.com"
        };

        // Initialisation de Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // LOGIQUE DE DÉTECTION DU PARRAIN
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            
            if (refCode) {
                // Si un parrain est dans l'URL, on l'affiche dans le champ
                document.getElementById('referral_code').value = refCode;
            }
        };

        function registerUser() {
            const user = document.getElementById('username').value;
            const phoneField = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            const pinConfirm = document.getElementById('pin_confirm').value;
            const refCode = document.getElementById('referral_code').value;

            if(!user || !phoneField || !pin) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            if(!/^\d{6}$/.test(pin)) {
                alert("Le mot de passe doit contenir 6 chiffres.");
                return;
            }

            if(pin !== pinConfirm) {
                alert("Les mots de passe ne correspondent pas.");
                return;
            }

            const fullPhone = "+243" + phoneField;

            // Création de l'utilisateur
            const userData = {
                username: user,
                phone: fullPhone,
                pin: pin,
                referredBy: refCode, // Enregistre le numéro du parrain
                balance: 0,
                date: new Date().toLocaleDateString()
            };

            // Vérifier si le numéro existe déjà dans Firebase
            database.ref('users/' + phoneField).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("Ce numéro est déjà utilisé.");
                } else {
                    // Ajout du nouvel utilisateur à la base de données Firebase
                    database.ref('users/' + phoneField).set(userData).then(() => {
                        // Sauvegarde locale pour maintenir la session immédiatement
                        localStorage.setItem('dnc_user', JSON.stringify(userData));
                        alert("Inscription réussie !");
                        window.location.href = "index.html"; 
                    }).catch((error) => {
                        console.error(error);
                        alert("Erreur lors de l'enregistrement dans la base de données.");
                    });
                }
            }).catch((error) => {
                console.error(error);
                alert("Impossible de vérifier les informations.");
            });
        }
    </script>

</body>
</html>
