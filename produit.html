<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNC | Boutique VIP Premium</title>
    <style>
        :root {
            --primary: #005bb5;
            --secondary: #f0f4f8;
            --accent: #27ae60;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0, 91, 181, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--secondary); padding-bottom: 90px; color: #333; }

        /* Header Style Premium */
        .header-premium {
            background: linear-gradient(135deg, #005bb5 0%, #003d7a 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-premium h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        .balance-pill {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .balance-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; display: block; }
        .balance-val { font-size: 22px; font-weight: 800; }

        .container { padding: 25px 15px; }

        /* Carte Produit Luxe */
        .card-vip {
            background: var(--white);
            border-radius: 25px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 91, 181, 0.1);
            position: relative;
        }

        .card-top {
            padding: 20px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .vip-circle {
            width: 60px; height: 60px;
            background: #f0f7ff;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; margin-right: 15px;
            box-shadow: inset 0 0 10px rgba(0,91,181,0.05);
        }

        .vip-title-area { flex-grow: 1; }
        .vip-tag {
            background: var(--primary);
            color: white;
            padding: 3px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            margin-bottom: 5px;
            display: inline-block;
        }
        .vip-name { font-size: 18px; font-weight: 700; color: #1a2a3a; }

        /* Grille Infos */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 20px;
            background: #f9fbff;
            gap: 15px;
            border-top: 1px solid #edf2f7;
        }

        .box-info { display: flex; flex-direction: column; }
        .label-info { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
        
        /* PRIX EN GRAND CARACTÈRE (Modification demandée) */
        .value-price { font-size: 22px; font-weight: 900; color: var(--primary); }
        
        .value-info { font-size: 15px; font-weight: 700; color: #334155; }
        .income-text { color: var(--accent) !important; }

        .card-action { padding: 15px 20px 20px; }

        .btn-invest {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, #005bb5, #0072e3);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 91, 181, 0.3);
            transition: 0.3s;
        }

        .btn-invest:active { transform: scale(0.96); }

        /* Modal Alerte */
        #modal-error {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 3000;
        }
        .modal-box { background: white; width: 85%; padding: 30px; border-radius: 30px; text-align: center; }
        .modal-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; margin-top: 20px; font-weight: bold; }
        .modal-btn-alt { background: #94a3b8; margin-top: 10px; }

        /* Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .nav-link { text-align: center; text-decoration: none; color: #a0aec0; font-size: 11px; font-weight: 600; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 2px; font-style: normal; }
    </style>
</head>
<body>

    <div id="modal-error">
        <div class="modal-box">
            <h2 style="color:#e74c3c">Solde insuffisant</h2>
            <p style="margin-top:10px">Votre solde actuel est insuffisant pour ce pack. Veuillez recharger votre compte.</p>
            <button class="modal-btn" onclick="goToRecharge()">RECHARGER MAINTENANT</button>
            <button class="modal-btn modal-btn-alt" onclick="goToHome()">D'ACCORD</button>
        </div>
    </div>

    <div class="header-premium">
        <h1>Boutique DNC</h1>
        <div class="balance-pill">
            <span class="balance-label">Solde Actuel</span>
            <span class="balance-val" id="solde-text">0 FC</span>
        </div>
    </div>

    <div class="container" id="list-container"></div>

    <nav class="nav-bar">
        <a href="accueil.html" class="nav-link"><i>🏠</i>MAISON</a>
        <a href="produit.html" class="nav-link active"><i>🛍️</i>PRODUIT</a>
        <a href="equipe.html" class="nav-link"><i>👥</i>ÉQUIPE</a>
        <a href="profile.html" class="nav-link"><i>👤</i>LE MIEN</a>
    </nav>

    <script>
        // Cycle de 60 jours appliqué et Revenu Total recalculé (Jour * 60)
        const mesVips = [
            { id: 1, prix: 15000, jour: 3600, total: 216000, icone: "📡" },
            { id: 2, prix: 35000, jour: 6000, total: 360000, icone: "🛰️" },
            { id: 3, prix: 50000, jour: 9000, total: 540000, icone: "🗼" },
            { id: 4, prix: 75000, jour: 15000, total: 900000, icone: "📶" },
            { id: 5, prix: 100000, jour: 21000, total: 1260000, icone: "🛸" },
            { id: 6, prix: 140000, jour: 30000, total: 1800000, icone: "🌐" },
            { id: 7, prix: 250000, jour: 53500, total: 3210000, icone: "🔌" },
            { id: 8, prix: 530000, jour: 100000, total: 6000000, icone: "🔋" },
            { id: 9, prix: 850000, jour: 120000, total: 7200000, icone: "💎" },
            { id: 10, prix: 1200000, jour: 180000, total: 10800000, icone: "🚀" },
            { id: 11, prix: 1800000, jour: 260000, total: 15600000, icone: "⚡" },
            { id: 12, prix: 2500000, jour: 350000, total: 21000000, icone: "🔥" },
            { id: 13, prix: 3500000, jour: 480000, total: 28800000, icone: "🌟" },
            { id: 14, prix: 5000000, jour: 650000, total: 39000000, icone: "👑" },
            { id: 15, prix: 7000000, jour: 900000, total: 54000000, icone: "🏆" },
            { id: 16, prix: 10000000, jour: 1300000, total: 78000000, icone: "💰" }
        ];

        let balance = 0;

        function loadProducts() {
            const user = JSON.parse(localStorage.getItem('dnc_user')) || { balance: 0 };
            balance = user.balance;
            document.getElementById('solde-text').innerText = balance.toLocaleString() + " FC";

            const container = document.getElementById('list-container');
            container.innerHTML = "";

            mesVips.forEach(v => {
                container.innerHTML += `
                    <div class="card-vip">
                        <div class="card-top">
                            <div class="vip-circle">${v.icone}</div>
                            <div class="vip-title-area">
                                <span class="vip-tag">OFFRE DNC VIP ${v.id}</span>
                                <div class="vip-name">Système Antenne VIP ${v.id}</div>
                            </div>
                        </div>
                        <div class="info-grid">
                            <div class="box-info">
                                <span class="label-info">PRIX DU PRODUIT</span>
                                <span class="value-price">${v.prix.toLocaleString()} FC</span>
                            </div>
                            <div class="box-info">
                                <span class="label-info">Gain / Jour</span>
                                <span class="value-info income-text">${v.jour.toLocaleString()} FC</span>
                            </div>
                            <div class="box-info">
                                <span class="label-info">Cycle</span>
                                <span class="value-info">60 Jours</span>
                            </div>
                            <div class="box-info">
                                <span class="label-info">Revenu Total</span>
                                <span class="value-info">${v.total.toLocaleString()} FC</span>
                            </div>
                        </div>
                        <div class="card-action">
                            <button class="btn-invest" onclick="buy(${v.prix}, ${v.id})">INVESTIR MAINTENANT</button>
                        </div>
                    </div>
                `;
            });
        }

        function buy(prix, id) {
            if (balance >= prix) {
                alert("Félicitations ! Vous avez activé le Pack VIP " + id);
            } else {
                document.getElementById('modal-error').style.display = 'flex';
            }
        }

        function goToRecharge() { window.location.href = "recharge.html"; }
        function goToHome() { window.location.href = "accueil.html"; }

        window.onload = loadProducts;
    </script>
</body>
</html>
