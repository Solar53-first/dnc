<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNC | Historique de Recharge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #ffffff; color: #333; height: 100vh; display: flex; flex-direction: column; }

        /* Header bleu selon votre capture */
        .header {
            background: #0056b3; color: white; padding: 15px;
            display: flex; align-items: center; font-weight: bold; font-size: 18px;
        }
        .back-btn { text-decoration: none; color: white; margin-right: 15px; font-size: 20px; }

        .content {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            text-align: center; color: #999;
        }

        .empty-icon { width: 80px; opacity: 0.5; margin-bottom: 20px; }
        .main-text { font-size: 16px; color: #666; margin-bottom: 5px; }
        .sub-text { font-size: 13px; color: #bbb; }

        /* Style pour les éléments si l'historique n'est PAS vide */
        .history-list { width: 100%; display: none; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="compte.html" class="back-btn">←</a>
        Historique de Recharge
    </div>

    <div class="content" id="empty-state">
        <img src="https://cdn-icons-png.flaticon.com/512/5082/5082855.png" alt="Dossier" class="empty-icon">
        <p class="main-text">Aucun historique de recharge</p>
        <p class="sub-text">Vos futures transactions apparaîtront ici.</p>
    </div>

    <div class="history-list" id="list-state">
        </div>

</body>
</html>
